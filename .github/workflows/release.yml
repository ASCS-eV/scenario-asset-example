name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup environment
      run: make setup

    - name: Generate asset
      run: make generate

    - name: Validate asset
      run: make validate

    - name: Find release artifact
      id: artifact
      run: |
        ZIP=$(find generated/output -name '*.zip' -type f | head -1)
        if [ -z "$ZIP" ]; then echo "No .zip found in generated/output/" >&2; exit 1; fi
        echo "path=$ZIP" >> "$GITHUB_OUTPUT"
        echo "name=$(basename "$ZIP")" >> "$GITHUB_OUTPUT"

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.artifact.outputs.path }}
