---
repos:
  - repo: local
    hooks:
      - id: validate
        name: validate asset JSON-LD
        entry: bash -c 'if [ -d generated/output ] && [ "$(ls -A generated/output 2>/dev/null)" ]; then make validate; else echo "[SKIP] No generated output yet (run: make generate)"; fi'
        language: system
        pass_filenames: false
        always_run: true
      - id: lint-md
        name: lint markdown
        entry: make lint-md
        language: system
        pass_filenames: false
        types: [markdown]
