---
repos:
  - repo: local
    hooks:
      - id: validate
        name: validate asset JSON-LD
        entry: make validate
        language: system
        pass_filenames: false
        always_run: true
      - id: lint-md
        name: lint markdown
        entry: make lint-md
        language: system
        pass_filenames: false
        types: [markdown]
